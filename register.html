{% extends 'food/base.html' %}
{% block title %}Register | Prathamesh Food-court{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-header bg-danger text-white text-center py-3">
          <h4 class="mb-0">🍕 Create Account</h4>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-bold">Full Name</label>
              <input type="text" name="name" class="form-control" placeholder="Your full name">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Username <span class="text-danger">*</span></label>
              <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Password <span class="text-danger">*</span></label>
              <input type="password" name="password1" class="form-control" placeholder="Min. 6 characters" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Confirm Password <span class="text-danger">*</span></label>
              <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Create Account 🎉</button>
          </form>
        </div>
        <div class="card-footer text-center py-3">
          Already have an account? <a href="{% url 'login' %}" class="text-danger fw-bold">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
