{% extends 'food/base.html' %}
{% block title %}Login | Prathamesh Food-court{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0">
        <div class="card-header bg-danger text-white text-center py-3">
          <h4 class="mb-0">🔐 Login</h4>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
              <label class="form-label fw-bold">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Login 👋</button>
          </form>
        </div>
        <div class="card-footer text-center py-3">
          New here? <a href="{% url 'register' %}" class="text-danger fw-bold">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
